<style>
        .animate-entrance {
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dotted-divider {
            background-image: linear-gradient(to right, #d2c4bc 33%, rgba(255,255,255,0) 0%);
            background-position: bottom;
            background-size: 4px 1px;
            background-repeat: repeat-x;
        }

        input:focus {
            outline: none;
            border-bottom-width: 2px !important;
            border-bottom-color: #735947 !important;
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-active .collapsible-content {
            max-height: 100px;
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top Editorial Banner -->
<div class="relative w-full h-48 md:h-64 overflow-hidden mb-8 animate-entrance" style="animation-delay: 0.1s;">
<img alt="Warm beige linen fabric with dark grey geometric embroidery lines, showing macro texture and digital craftsmanship detail." class="w-full h-full object-cover grayscale-[20%] sepia-[10%]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlg4PrBPPW6Yq1kmFVAZTbXfQOAuu1uPikYMXlSNzKUHMYq6UkqHbEeXSdBbquqxrAi54RtZZ7IVOvIPBtT6LpQXyg8Jc-iw7J-ewYkWuqpvk9FMdGmxg9KuYk9CveRpSiKq9Zm_-BG5Zo1n6SitUwb5qcuNLmiOs14X_noihfUCDz4cWbNQSWrbJU-VrI_KlbW0G9a59LzviutkjMA-d7BlMTonTFcKAK8qoMHN2u77Uit2Ea8wFGsx8qr9xW0RNOQVaNe3G9rVFh"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<!-- Main Branding Header -->
<header class="w-full px-margin-mobile text-center mb-6 animate-entrance" style="animation-delay: 0.2s;">
<h1 class="font-label-caps text-label-caps tracking-[0.25em] text-primary uppercase">TWOTHREADS STUDIO</h1>
<div class="mt-4 w-1/3 mx-auto border-b border-dotted border-tertiary-fixed-dim"></div>
</header>
<!-- Sign-up Form Container -->
<main class="flex-grow px-margin-mobile max-w-md mx-auto w-full animate-entrance" style="animation-delay: 0.3s;">
<div class="mb-10">
<h2 class="font-headline-lg-mobile text-[30px] text-primary-container leading-tight">Create Account</h2>
</div>
<form action="#" class="flex flex-col gap-8">
<!-- Name Field -->
<div class="flex flex-col gap-2 group">
<label class="font-label-caps text-[11px] tracking-[0.15em] text-on-surface-variant uppercase" for="name">Name</label>
<input class="bg-transparent border-0 border-b border-tertiary-fixed-dim py-2 px-0 text-body-lg placeholder:text-surface-dim focus:ring-0 transition-all duration-300" id="name" name="name" placeholder="Evelyn Thorne" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2 group">
<label class="font-label-caps text-[11px] tracking-[0.15em] text-on-surface-variant uppercase" for="email">Email</label>
<input class="bg-transparent border-0 border-b border-tertiary-fixed-dim py-2 px-0 text-body-lg placeholder:text-surface-dim focus:ring-0 transition-all duration-300" id="email" name="email" placeholder="evelyn@studio.co" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2 group">
<label class="font-label-caps text-[11px] tracking-[0.15em] text-on-surface-variant uppercase" for="password">Password</label>
<input class="bg-transparent border-0 border-b border-tertiary-fixed-dim py-2 px-0 text-body-lg placeholder:text-surface-dim focus:ring-0 transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary-container text-surface-container-lowest py-5 font-button-text text-button-text tracking-[0.2em] uppercase mt-4 hover:bg-secondary transition-colors duration-300 active:scale-[0.98]" type="submit">
                CREATE ACCOUNT
            </button>
</form>
<!-- Collapsible Hint Section -->
<div class="mt-12 mb-20 animate-entrance" style="animation-delay: 0.4s;">
<div class="border-t border-dotted border-tertiary-fixed-dim pt-4" id="credentials-accordion">
<button class="w-full flex justify-between items-center text-on-surface-variant hover:text-primary transition-colors duration-200" onclick="toggleAccordion()">
<span class="font-label-caps text-[10px] tracking-widest uppercase">Need test credentials?</span>
<span class="material-symbols-outlined text-sm transition-transform duration-300" id="accordion-icon">expand_more</span>
</button>
<div class="collapsible-content" id="accordion-content">
<div class="pt-4 pb-2 text-[12px] font-body-md text-on-surface-variant leading-relaxed">
<p>For review purposes, you may use <span class="font-bold">test@twothreads.com</span> / <span class="font-bold">studio2024</span> to access the artisan dashboard directly.</p>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="mt-auto py-8 text-center animate-entrance" style="animation-delay: 0.5s;">
<p class="font-label-caps text-[10px] text-surface-tint tracking-widest uppercase">© TWOTHREADS STUDIO MMXXIV</p>
</footer>
<script>
        function toggleAccordion() {
            const container = document.getElementById('credentials-accordion');
            const icon = document.getElementById('accordion-icon');
            
            container.classList.toggle('collapsible-active');
            
            if (container.classList.contains('collapsible-active')) {
                icon.style.transform = 'rotate(180deg)';
            } else {
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // Add subtle parallax to header image on scroll
        window.addEventListener('scroll', () => {
            const banner = document.querySelector('img');
            const scrolled = window.pageYOffset;
            banner.style.transform = `translateY(${scrolled * 0.15}px)`;
        });

        // Form interaction feedback
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.previousElementSibling.classList.add('text-secondary');
            });
            input.addEventListener('blur', () => {
                input.previousElementSibling.classList.remove('text-secondary');
            });
        });
    </script>
</body></html>
