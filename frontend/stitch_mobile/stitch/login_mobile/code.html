        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>

                    "surface-tint": "#675c56",

                    "on-secondary-container": "#785d4b",

                    "secondary-fixed-dim": "#e2c0aa",
                    "tertiary": "#17110c",
                    "primary-container": "#2d2520",
                    "secondary-fixed": "#ffdcc5",
                    "error": "#ba1a1a",

                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",

                    "surface-container-highest": "#e7e1dd",

<body class="bg-background text-on-surface font-body-md overflow-x-hidden">
<main class="min-h-screen flex flex-col items-center">
<!-- Banner Image -->
<section class="w-full h-48 relative overflow-hidden">
<img alt="Detailed textile embroidery macro shot showing artisanal gray threading on warm linen." class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlg4PrBPPW6Yq1kmFVAZTbXfQOAuu1uPikYMXlSNzKUHMYq6UkqHbEeXSdBbquqxrAi54RtZZ7IVOvIPBtT6LpQXyg8Jc-iw7J-ewYkWuqpvk9FMdGmxg9KuYk9CveRpSiKq9Zm_-BG5Zo1n6SitUwb5qcuNLmiOs14X_noihfUCDz4cWbNQSWrbJU-VrI_KlbW0G9a59LzviutkjMA-d7BlMTonTFcKAK8qoMHN2u77Uit2Ea8wFGsx8qr9xW0RNOQVaNe3G9rVFh"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"></div>
</section>
<!-- Identity & Header -->
<header class="w-full pt-8 pb-4 px-margin-mobile text-center fade-in-up" style="animation-delay: 0.1s;">
<h1 class="font-label-caps text-label-caps tracking-[0.25em] text-primary">TWOTHREADS STUDIO</h1>
<div class="mt-6 border-b border-dotted border-tertiary-fixed-dim w-1/4 mx-auto"></div>
</header>
<!-- Form Container -->
<section class="w-full max-w-md px-margin-mobile mt-12 fade-in-up" style="animation-delay: 0.2s;">
<h2 class="font-headline-lg-mobile text-[30px] text-primary-container mb-10 text-center">Sign In</h2>
<form class="flex flex-col gap-10">
<!-- Username Field -->
<div class="flex flex-col space-y-2 group">
<label class="font-label-caps text-[11px] tracking-[0.15em] text-on-surface-variant uppercase" for="username">
                        Username
                    </label>
<div class="border-b border-tertiary-fixed-dim transition-all duration-300 input-line">
<input class="w-full bg-transparent border-none p-0 pb-2 focus:ring-0 text-primary font-body-md placeholder:text-outline-variant" id="username" name="username" placeholder="Artisan ID or Email" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col space-y-2 group">
<div class="flex justify-between items-baseline">
<label class="font-label-caps text-[11px] tracking-[0.15em] text-on-surface-variant uppercase" for="password">
                            Password
                        </label>
</div>
<div class="border-b border-tertiary-fixed-dim transition-all duration-300 input-line relative">
<input class="w-full bg-transparent border-none p-0 pb-2 focus:ring-0 text-primary font-body-md placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Controls -->
<div class="flex items-center justify-between font-label-caps text-[11px] tracking-wider">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="h-4 w-4 border-outline-variant text-secondary rounded-none focus:ring-offset-background focus:ring-secondary transition-colors bg-transparent" type="checkbox"/>
<span class="text-on-surface-variant group-hover:text-primary transition-colors">REMEMBER ME</span>
</label>
<a class="text-secondary hover:text-primary transition-colors border-b border-transparent hover:border-secondary" href="#">FORGOT PASSWORD?</a>
</div>
<!-- CTA -->
<button class="w-full bg-primary-container text-surface py-5 font-button-text text-button-text tracking-[0.2em] transition-all duration-300 hover:bg-secondary active:scale-[0.98]" type="submit">
                    SIGN IN
                </button>
</form>
<!-- Hint / Accordion -->
<div class="mt-16 mb-24">
<div class="border-t border-dotted border-tertiary-fixed-dim pt-4">
<button class="w-full flex justify-between items-center text-on-surface-variant font-label-caps text-[10px] tracking-widest focus:outline-none" id="accordion-toggle">
                        NEED TEST CREDENTIALS?
                        <span class="material-symbols-outlined transition-transform duration-300" id="accordion-icon" style="font-size: 14px;">expand_more</span>
</button>
<div class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out opacity-0" id="accordion-content">
<div class="py-4 text-[12px] font-body-md text-on-tertiary-fixed-variant leading-relaxed italic">
                            Email: demo@twothreads.studio<br/>
                            Password: artisan_craft_2024
                        </div>
</div>
</div>
</div>
</section>
</main>
<!-- Interactive Logic -->
<script>
        const accordionToggle = document.getElementById('accordion-toggle');
        const accordionContent = document.getElementById('accordion-content');
        const accordionIcon = document.getElementById('accordion-icon');

        accordionToggle.addEventListener('click', () => {
            const isOpen = accordionContent.classList.contains('max-h-24');
            
            if (isOpen) {
                accordionContent.classList.remove('max-h-24', 'opacity-100');
                accordionContent.classList.add('max-h-0', 'opacity-0');
                accordionIcon.style.transform = 'rotate(0deg)';
            } else {
                accordionContent.classList.remove('max-h-0', 'opacity-0');
                accordionContent.classList.add('max-h-24', 'opacity-100');
                accordionIcon.style.transform = 'rotate(180deg)';
            }
        });

        // Subtle parallax effect on banner image
        window.addEventListener('scroll', () => {
            const scroll = window.pageYOffset;
            const bannerImg = document.querySelector('section img');
            if (bannerImg) {
                bannerImg.style.transform = `translateY(${scroll * 0.15}px)`;
            }
        });
    </script>
</body></html>
